<!DOCTYPE html>
<html>
<head>
<title>Marquee Example</title>
</head>
<body>

<h3>Marquee Tag</h3>

<marquee>Welcome to HTML</marquee>

<marquee direction="right">Moving Right</marquee>

<marquee direction="up">Moving Up</marquee>

<marquee direction="down">Moving Down</marquee>

<marquee behavior="alternate">Bouncing Text</marquee>

</body>
</html>
